name: Deploy Single Resource

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy Storage
      run: |
        az deployment group create \
          --resource-group rg-bicep-demo \
          --template-file infra/storage.bicep \
          --parameters storageAccountName=stor${RANDOM}